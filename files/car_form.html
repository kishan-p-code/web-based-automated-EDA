{% extends "base.html" %}
{% block title %}{{ 'Add Car' if mode == 'new' else 'Edit Car' }} · Auto Inventory{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Add a Vehicle' if mode == 'new' else 'Edit Vehicle' }}</h1>

<form class="car-form" method="post">
    <div class="form-row">
        <label for="brand">Brand</label>
        <input type="text" id="brand" name="brand" value="{{ car.brand if car else '' }}" required>
    </div>

    <div class="form-row">
        <label for="model">Model</label>
        <input type="text" id="model" name="model" value="{{ car.model if car else '' }}" required>
    </div>

    <div class="form-row form-row-split">
        <div>
            <label for="year">Year</label>
            <input type="number" id="year" name="year" value="{{ car.year if car else '' }}" min="1900" max="2100" required>
        </div>
        <div>
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" value="{{ car.price if car else '' }}" min="0" step="0.01" required>
        </div>
    </div>

    <div class="form-row form-row-split">
        <div>
            <label for="fuel_type">Fuel Type</label>
            <select id="fuel_type" name="fuel_type">
                {% for option in ['Petrol', 'Diesel', 'Hybrid', 'Electric'] %}
                <option value="{{ option }}" {% if car and car.fuel_type == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="mileage">Mileage (mi)</label>
            <input type="number" id="mileage" name="mileage" value="{{ car.mileage if car else 0 }}" min="0">
        </div>
    </div>

    <div class="form-row">
        <label for="status">Status</label>
        <select id="status" name="status">
            {% for option in ['Available', 'Reserved', 'Sold'] %}
            <option value="{{ option }}" {% if car and car.status == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">{{ 'Add Car' if mode == 'new' else 'Save Changes' }}</button>
        <a href="{{ url_for('list_cars') }}" class="btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
